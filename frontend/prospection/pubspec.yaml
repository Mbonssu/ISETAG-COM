name: isetagcom
description: ISETAG Prospection & Communication
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  image_picker: ^1.0.5
  excel: ^4.0.6
  pdf: ^3.10.7
  printing: ^5.11.1
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  csv: ^5.0.2
  fl_chart: ^0.63.0
  font_awesome_flutter: ^10.5.0
  google_fonts: ^6.2.1

  # Isar
  # isar: ^3.1.0+1
  # isar_flutter_libs: ^3.1.0+1

  # Isar (community fork)
  isar_community: ^3.2.0
  isar_community_flutter_libs: ^3.2.0
  
  # Other packages
  flutter_local_notifications: ^18.0.1
  permission_handler: ^12.0.3
  timezone: ^0.9.0
  url_launcher: ^6.3.2
  open_file: ^4.0.0
  connectivity_plus: ^7.1.1
  http: ^1.6.0
  provider: ^6.1.5+1
  dio: ^5.10.0
  crypto: ^3.0.7
  uuid: ^4.5.3
  jwt_decoder: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # isar_generator: ^3.1.0+1
  isar_community_generator: ^3.2.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1  # Moved here, with version

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/image.png
    - assets/images/login.png
    - assets/images/Background_ISETAG-COM.png
    - assets/images/logoIcon.png
    - assets/images/logoIcon.ico
    - assets/images/logoIcon.jpg
    - assets/images/logo.png
    - assets/images/logprime.jpeg
    - assets/images/app_icon.png  #  Add this if you have it

# Moved outside flutter section, at root level
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#2E7D32"
    theme_color: "#2E7D32"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
  macos:
    generate: true
    image_path: "assets/images/app_icon.png"