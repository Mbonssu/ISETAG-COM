name: isetagcom
description: ISETAG Prospection & Communication
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  image_picker: ^1.0.5
  excel: ^4.0.6
  pdf: ^3.10.7
  printing: ^5.11.1
  path_provider: ^2.1.1
  share_plus: ^7.2.1

  #  Utilise les dernières versions st  ables d'Isar
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  # flutter_offline_queue_pro: ^1.0.4
  flutter_local_notifications: ^22.0.0
  permission_handler: ^12.0.3
  timezone: ^0.11.0
  url_launcher: ^6.3.2
  open_file: ^4.0.0
  connectivity_plus: ^7.1.1
  http: ^1.6.0
  # workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  isar_generator: ^3.1.0+1 # ← Garde la version 3.x
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/image.png
    - assets/images/login.png
    - assets/images/Background_ISETAG-COM.png
    - assets/images/logoIcon.png
    - assets/images/logoIcon.ico
    - assets/images/logoIcon.jpg
    - assets/images/logo.png
    - assets/images/logprime.jpeg
    - assets/images/app_icon.png
